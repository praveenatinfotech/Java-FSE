<h2>Student Profile</h2>

<h3>Enrolled Courses</h3>

<div *ngIf="enrollmentService.getEnrolledCourses().length > 0; else noCourses">

  <ul>

    <li *ngFor="let course of enrollmentService.getEnrolledCourses()">

      <strong>{{ course.name }}</strong> - {{ course.code }}

    </li>

  </ul>

</div>

<ng-template #noCourses>

  <p>No enrolled courses.</p>

</ng-template>
